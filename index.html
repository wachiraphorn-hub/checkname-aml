const ResultBadge = ({ result, size = 'md', label }) => {

    hit:  { bg: 'var(--red-50)',   fg: '#B91C1C', icon: '✕', text: 'พบรายชื่อ' },
  };
  const m = map[result];
  const sizes = {
    sm: { fs: 11, py: 3, px: 8,  dot: 14 },
    md: { fs: 12, py: 5, px: 10, dot: 18 },
    lg: { fs: 14, py: 8, px: 14, dot: 24 },
  };
  const s = sizes[size];
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 6,
      background: m.bg, color: m.fg,
      padding: `${s.py}px ${s.px}px`, borderRadius: 999,

  return (
    <input {...props} ref={ref}

        ...mInputBase,
        borderColor: props.invalid ? 'var(--red)' : focus ? 'var(--emerald)' : 'var(--navy-200)',
        boxShadow: focus ? '0 0 0 3px rgba(16,185,129,0.12)' : 'none',
        ...(props.style || {}),

    />
  );
});

const MButton = ({ children, kind = 'accent', onClick, disabled, full = true, style }) => {

    accent: { bg: 'var(--emerald)',     fg: '#fff',            bd: 'var(--emerald)' },

    text:   { bg: 'transparent',        fg: 'var(--navy)',     bd: 'transparent' },

  return (
    <button onClick={disabled ? undefined : onClick} disabled={disabled} style={{
      flex: full ? 1 : 'none',
      padding: '14px 18px', fontSize: 15, fontWeight: 700,
      background: k.bg, color: k.fg, border: `1px solid ${k.bd}`,

/* ═══════════════════ SUBSCRIPTION CHECK ═══════════════════ */

async function checkSubscription(userId) {
  try {
    const res = await fetch(`${BACKEND_URL}/check-subscription?userId=${encodeURIComponent(userId)}`);
    if (!res.ok) throw new Error('api_error');
    const data = await res.json();
    return data.subscribed === true;
  } catch (e) {
    console.error('checkSubscription failed:', e);
    return false; // fail-closed: block access if API unreachable
  }
}

    const t1 = setTimeout(() => setStage('scanning'), 1500);

      setStage('result');
      const conf = ctx.ocrConfOverride === 'low' ? 0.62 : 0.96;
      if (conf < 0.75) {
        const next = ctx.ocrFailCount + 1;
        ctx.setOcrFailCount(next);

        else ctx.goTo('ocrLow');
      } else {
        ctx.setCustomer(docType === 'passport'

/* ─── Screening Progress ─── */
const AmlScreeningProgress = ({ ctx }) => {
  const [step, setStep] = React.useState(0);
  const stages = ['ส่งข้อมูลไปยังฐาน AML', 'ค้นหาใน 7 ฐานข้อมูล', 'วิเคราะห์ความเสี่ยง', 'บันทึก audit trail'];
  React.useEffect(() => {
    const timers = [];
    timers.push(setTimeout(() => setStep(1), 700));
    timers.push(setTimeout(() => setStep(2), 1500));
    timers.push(setTimeout(() => setStep(3), 2300));
    timers.push(setTimeout(() => { const r = ctx.riskOverride || 'pass'; ctx.goTo(r); }, 3000));
    return () => timers.forEach((t) => clearTimeout(t));
  }, []);
  return (
    <div style={{ minHeight: '100%', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '40px 20px', textAlign: 'center' }}>
      <div style={{ width: 96, height: 96, borderRadius: '50%', marginBottom: 24, background: 'var(--emerald-50)', position: 'relative', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        <span style={{ position: 'absolute', inset: 8, border: '4px solid var(--emerald)', borderRightColor: 'transparent', borderRadius: '50%', animation: 'spin 1s linear infinite' }}/>
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="var(--emerald-700)" strokeWidth="1.8"/><path d="M16.5 16.5 L21 21" stroke="var(--emerald-700)" strokeWidth="2.2" strokeLinecap="round"/></svg>
      </div>
      <h1 style={{ ...am.h1, textAlign: 'center' }}>กำลังตรวจ AML</h1>
      <p style={{ ...am.sub, textAlign: 'center', marginBottom: 24 }}>
        {ctx.customer.type === 'company' ? (ctx.customer.companyName || '—') : `${ctx.customer.firstName} ${ctx.customer.lastName}`}
      </p>
      <div style={{ width: '100%', maxWidth: 280, display: 'flex', flexDirection: 'column', gap: 8 }}>
        {stages.map((s, i) => {
          const done = i < step; const active = i === step;
          return (
            <div key={s} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '10px 12px', background: active ? 'var(--white)' : 'transparent', border: `1px solid ${active ? 'var(--emerald)' : 'transparent'}`, borderRadius: 8, opacity: done || active ? 1 : 0.4, transition: 'opacity 200ms' }}>
              <span style={{ width: 16, height: 16, borderRadius: '50%', background: done ? 'var(--emerald)' : active ? 'var(--white)' : 'var(--navy-100)', border: active ? '2px solid var(--emerald)' : 'none', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                {done && <svg width="9" height="9" viewBox="0 0 12 12"><path d="M2.5 6 L5 8.5 L9.5 3.5" stroke="#fff" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                {active && <span style={{ width: 6, height: 6, borderRadius: '50%', background: 'var(--emerald)' }}/>}
              </span>
              <span style={{ fontSize: 13, fontWeight: done || active ? 600 : 500, color: done || active ? 'var(--navy)' : 'var(--navy-400)', textAlign: 'left', flex: 1 }}>{s}</span>
            </div>
          );
        })}
      </div>
    </div>
  );
};

    <div style={{ background: 'var(--white)', border: '1px solid var(--gray-line)', borderRadius: 14, padding: 16, marginBottom: 14, fontSize: 12.5, color: 'var(--navy-500)', lineHeight: 1.6 }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6 }}>
        <span>เลขที่อ้างอิง</span>
        <span style={{ color: 'var(--navy)', fontWeight: 600, fontFamily: 'var(--mono)' }}>ERR-{String(Date.now()).slice(-6)}</span>
      </div>
      <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6 }}>
        <span>เหตุผล</span>
        <span style={{ color: 'var(--navy)', fontWeight: 600 }}>API Timeout (retry 2 ครั้ง)</span>
      </div>
      <div style={{ display: 'flex', justifyContent: 'space-between' }}>
        <span>เวลา</span>
        <span style={{ color: 'var(--navy)', fontWeight: 600, fontFamily: 'var(--mono)' }}>{new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' })}</span>
      </div>
    </div>

    <div style={{ padding: '12px 14px', background: 'var(--emerald-50)', borderRadius: 10, border: '1px solid #A7F3D0', fontSize: 12, color: 'var(--emerald-700)', lineHeight: 1.55, marginBottom: 18 }}>
      ✓ Quota ถูกคืนอัตโนมัติ · ✓ ทีม Ops ได้รับการแจ้งเตือนแล้ว
    </div>
    <div style={{ flex: 1 }}/>
    <div style={am.cta}>
      <MButton kind="ghost" full={false} onClick={() => ctx.goTo('home')} style={{ minWidth: 80 }}>กลับ</MButton>
      <MButton kind="accent" onClick={() => ctx.goTo('screening')}>ลองอีกครั้ง <Arrow size={14}/></MButton>
    </div>
  </div>
);

/* ═══════════════════ RESULT SELECTOR + ROOT APP ═══════════════════ */

const RISK_OPTIONS = [
  { v: 'pass', label: 'PASS', color: 'var(--emerald)' },
  { v: 'near', label: 'NEAR',  color: 'var(--amber)' },
  { v: 'hit',  label: 'HIT',   color: 'var(--red)' },
];

const App = () => {
  const [phase, setPhase] = React.useState('authLoading');
  const [liffProfile, setLiffProfile] = React.useState(null);
  const [riskOverride, setRiskOverride] = React.useState('pass');
  const [ocrConfOverride, setOcrConfOverride] = React.useState('high');
  const [ocrFailCount, setOcrFailCount] = React.useState(0);
  const [customer, setCustomer] = React.useState({
    type: 'person',
    firstName: 'สมศรี', lastName: 'ใจดี',
    dob: '15/08/2528', idNumber: '1-1010-12345-67-8',
    companyName: 'บริษัท สยามโกลด์ จำกัด', regNumber: '0105566100001',
  });
  const [quotaUsed, setQuotaUsed] = React.useState(2847);
  const QUOTA = 3000;

  React.useEffect(() => { initAuth(); }, []);

  const initAuth = async () => {
    try {
      if (typeof liff === 'undefined' || !liff.init) {
        setPhase('home'); return; // dev/preview mode
      }
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) {
        liff.login(); // redirect to LINE login — page reloads after
        return;
      }
      const profile = await liff.getProfile();
      setLiffProfile(profile);
      const subscribed = await checkSubscription(profile.userId);
      setPhase(subscribed ? 'home' : 'authBlocked');
    } catch (e) {
      console.warn('LIFF init failed, entering preview mode:', e);
      setPhase('home');
    }
  };

  const ctx = {
    phase, goTo: setPhase, setPhase,
    customer, setCustomer,
    ocrFailCount, setOcrFailCount,
    quotaUsed, setQuotaUsed, QUOTA,
    onExit: () => {},
    ocrConfOverride, riskOverride,
    liffProfile,
  };

  return (
    <div style={am.page}>
      <div style={am.label}>
        <span style={{ width: 6, height: 6, borderRadius: '50%', background: 'var(--line-green)' }}/>
        LINE LIFF · Staff AML Screening
      </div>

      {/* Phase nav */}
      <div style={{ position: 'absolute', top: 14, left: '50%', transform: 'translateX(-50%)', zIndex: 10 }}>
        <PhaseNav phases={AML_PHASES} current={phase} onSelect={setPhase}/>
      </div>

      {/* Controls */}
      <div style={{ position: 'absolute', bottom: 18, left: '50%', transform: 'translateX(-50%)', display: 'flex', gap: 12, alignItems: 'center', zIndex: 10 }}>
        <div style={{ display: 'flex', gap: 4, background: 'var(--white)', border: '1px solid var(--gray-line)', borderRadius: 8, padding: 4 }}>
          <span style={{ fontSize: 10, fontFamily: 'var(--mono)', color: 'var(--navy-400)', alignSelf: 'center', paddingLeft: 4 }}>RESULT</span>
          {RISK_OPTIONS.map((o) => (
            <button key={o.v} onClick={() => setRiskOverride(o.v)} style={{
              padding: '4px 10px', borderRadius: 5, fontSize: 10, fontWeight: 700,
              fontFamily: 'var(--mono)', letterSpacing: '0.04em', border: 'none', cursor: 'pointer',
              background: riskOverride === o.v ? o.color : 'transparent',
              color: riskOverride === o.v ? '#fff' : 'var(--navy-400)',
              transition: 'all 120ms',
            }}>{o.label}</button>
          ))}
        </div>
        <div style={{ display: 'flex', gap: 4, background: 'var(--white)', border: '1px solid var(--gray-line)', borderRadius: 8, padding: 4 }}>
          <span style={{ fontSize: 10, fontFamily: 'var(--mono)', color: 'var(--navy-400)', alignSelf: 'center', paddingLeft: 4 }}>OCR</span>
          {[{ v: 'high', label: 'CLEAR' }, { v: 'low', label: 'BLUR' }].map((o) => (
            <button key={o.v} onClick={() => setOcrConfOverride(o.v)} style={{
              padding: '4px 10px', borderRadius: 5, fontSize: 10, fontWeight: 700,
              fontFamily: 'var(--mono)', letterSpacing: '0.04em', border: 'none', cursor: 'pointer',
              background: ocrConfOverride === o.v ? 'var(--navy)' : 'transparent',
              color: ocrConfOverride === o.v ? '#fff' : 'var(--navy-400)',
              transition: 'all 120ms',
            }}>{o.label}</button>
          ))}
        </div>
      </div>

      <IOSDevice width={402} height={874}>
        <AmlShell ctx={ctx}/>
      </IOSDevice>

      <div style={{ marginTop: 22, fontFamily: 'var(--mono)', fontSize: 11, color: 'var(--navy-400)', letterSpacing: '0.06em', textTransform: 'uppercase' }}>
        {AML_PHASES.find((p) => p.id === phase)?.label || phase} · {AML_PHASES.find((p) => p.id === phase)?.en || ''}
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body>
</html>
